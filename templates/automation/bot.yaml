# bot.yaml – Automation Bot Template
#
# This manifest defines the components and configuration for a
# general-purpose automation bot generated by Factory.ai.

name: AutomationBot
version: "1.0.0"
description: >
  A task-automation bot that processes triggers, applies business rules,
  and executes workflows across integrated cloud services.

# ── Brain Kit ─────────────────────────────────────────────────────────────────
brain_kit:
  module: components.brain_kit.brain_kit
  intents:
    run_job:     ["run", "execute", "start", "trigger", "launch"]
    stop_job:    ["stop", "cancel", "abort", "halt", "kill"]
    status:      ["status", "check", "list", "show", "report"]
    schedule:    ["schedule", "cron", "at", "every", "interval"]
  memory:
    ttl_seconds: 86400      # retain job context for 24 hours
  decision:
    rules:
      - condition: "intent == 'run_job'"
        action:    "dispatch_job"
      - condition: "intent == 'stop_job'"
        action:    "cancel_job"
      - condition: "intent == 'status'"
        action:    "report_status"
      - condition: "intent == 'schedule'"
        action:    "create_schedule"

# ── Components ────────────────────────────────────────────────────────────────
components:
  nlp:
    module: components.nlp.text_processor
    intents:
      run_job:     ["run", "execute", "start", "trigger", "launch"]
      stop_job:    ["stop", "cancel", "abort", "halt", "kill"]
      status:      ["status", "check", "list", "show", "report"]
      schedule:    ["schedule", "cron", "at", "every", "interval"]

  memory:
    module: components.memory.state_store
    ttl_seconds: 86400      # retain job context for 24 hours

  decision:
    module: components.decision.rule_engine
    rules:
      - condition: "intent == 'run_job'"
        action:    "dispatch_job"
      - condition: "intent == 'stop_job'"
        action:    "cancel_job"
      - condition: "intent == 'status'"
        action:    "report_status"
      - condition: "intent == 'schedule'"
        action:    "create_schedule"

# ── Extensions ────────────────────────────────────────────────────────────────
extensions: []

# ── Integrations ──────────────────────────────────────────────────────────────
integrations:
  allbots:
    enabled: true
    queue:   "automation-queue"
  aws:
    enabled: false          # set to true and configure credentials for AWS
  azure:
    enabled: false
  gcp:
    enabled: false

# ── Deployment ────────────────────────────────────────────────────────────────
deployment:
  target: allbots           # allbots | aws | azure | gcp
  replicas: 1
  environment:
    LOG_LEVEL: "INFO"
    MAX_CONCURRENT_JOBS: "10"
